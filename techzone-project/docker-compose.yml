version: '3.8'

services:
  web:
    image: php:8.0-apache
    container_name: techzone-app-server
    ports:
      - "80:80"
    volumes:
      - ./frontend:/var/www/html
    restart: always

  db:
    image: mysql:5.7
    container_name: techzone-db
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: techzone_db
    ports:
      - "3306:3306"
    volumes:
      - ./database:/docker-entrypoint-initdb.d
    restart: always
